<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Places — A Love Story</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <span class="header-main">Places</span>
    </div>
    <div class="header-center"></div>
    <span class="header-count">You are the place where I feel I belong and I will be the person who belongs to you.</span>
  </header>

  <div id="map-wrapper">
    <div id="map"></div>
    <div class="map-legend" id="legend"></div>
  </div>

  <div id="modal-overlay">
    <div class="modal-card">
      <div class="modal-image">
        <img id="modal-img" src="" alt="" />
        <div class="modal-image-overlay"></div>
        <div class="modal-image-badge" id="modal-badge">Memory 1 of 5</div>
        <div class="modal-image-loc">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="white">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          </svg>
          <span id="modal-loc-text"></span>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-date"  id="modal-date"></div>
        <div class="modal-divider"></div>
        <div class="modal-note"  id="modal-note"></div>
        <div class="modal-footer">
          <div class="modal-nav">
            <button class="nav-btn" id="nav-prev" onclick="navigateModal(-1)">&#8249;</button>
            <button class="nav-btn" id="nav-next" onclick="navigateModal(1)">&#8250;</button>
          </div>
          <span class="modal-counter" id="modal-counter"></span>
          <button class="modal-close-btn" onclick="closeModal()">Close &#x2715;</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="places.js"></script>
  <script src="app.js"></script>

</body>
</html>
